<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tưới Cây Thông Minh</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg blob-1"></div>
    <div class="blob-bg blob-2"></div>
    <div class="container">
        
        <header class="glass-panel main-header">
            <div class="logo">

                <div>
                    <h1>Hệ Thống Tưới Cây</h1>
                    <p>Công nghệ AI cho Ban công & Nhà ở</p>
                </div>
            </div>
            <div class="time-widget">
                <span id="current-time">00:00:00</span>
                <span id="current-date">--/--/----</span>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Sensor Cards -->
            <div class="glass-panel card sensor-card">

                <div class="card-info">
                    <h3>Nhiệt độ</h3>
                    <div class="value">
                        <span id="temp-val">--</span><span class="unit">°C</span>
                    </div>
                </div>
            </div>

            <div class="glass-panel card sensor-card">

                <div class="card-info">
                    <h3>Độ ẩm không khí</h3>
                    <div class="value">
                        <span id="air-humid-val">--</span><span class="unit">%</span>
                    </div>
                </div>
            </div>

            <div class="glass-panel card sensor-card highlight">

                <div class="card-info">
                    <h3>Độ ẩm đất</h3>
                    <div class="value">
                        <span id="soil-moisture-val">--</span><span class="unit">%</span>
                    </div>
                    <div class="status-badge" id="soil-status">Tối ưu</div>
                </div>
            </div>

            <div class="glass-panel card sensor-card">

                <div class="card-info">
                    <h3>Xác suất mưa</h3>
                    <div class="value">
                        <span id="rain-prob-val">--</span><span class="unit">%</span>
                    </div>
                </div>
            </div>

            <!-- Main Control / Pump -->
            <div class="glass-panel card control-card">
                <h3>Điều khiển Máy bơm</h3>
                <div class="pump-status-container">
                    <div class="pump-indicator" id="pump-indicator">
                        <div class="ripple"></div>
                    </div>
                    <h2 id="pump-text">OFF</h2>
                </div>
                <p id="pump-reason">Hệ thống đang nghỉ</p>
                <div class="toggle-container">
                    <span>Chế độ thủ công</span>
                    <label class="switch">
                        <input type="checkbox" id="manual-pump-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Chart -->
            <div class="glass-panel card chart-card">
                <h3>Lịch sử độ ẩm đất (24h)</h3>
                <div class="chart-container">
                    <canvas id="moistureChart"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
